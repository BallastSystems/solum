# api.solum.work — serves the live data files the site reads + proxies the claim endpoint.
# The static site (solum.work) stays on gh-pages/Fastly; only the dynamic JSON + /claim live here.
# certbot --nginx -d api.solum.work rewrites this to add the TLS (443) server block.
server {
    listen 80;
    server_name api.solum.work;

    # CORS so the site (solum.work) can fetch these cross-subdomain
    add_header Access-Control-Allow-Origin "https://solum.work" always;

    # live status + winners, written by the bot (no-cache so the counter is fresh)
    location ~ ^/(status|winners)\.json$ {
        root /var/www/solum-data;
        add_header Access-Control-Allow-Origin "https://solum.work" always;
        add_header Cache-Control "no-store" always;
    }
    location /snapshots/ {
        root /var/www/solum-data;
        add_header Access-Control-Allow-Origin "https://solum.work" always;
    }

    # winner claim → claim service on :8787
    location /claim {
        proxy_pass http://127.0.0.1:8787/claim;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /health {
        proxy_pass http://127.0.0.1:8787/health;
    }
}
